name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy to shared hosting
    runs-on: ubuntu-latest
    env:
      REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, pdo_mysql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Build assets
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build || true
          fi

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts || true

      - name: Rsync files to remote
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='storage' \
            --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }}" ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_PATH }}

      - name: Run remote deployment commands
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
          cd ${{ secrets.REMOTE_PATH }}
          # installer les dépendances côté serveur
          if command -v composer >/dev/null 2>&1; then
            composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          fi
          # clear caches
          if php artisan --version >/dev/null 2>&1; then
            php artisan cache:clear || true
            php artisan config:clear || true
            php artisan view:clear || true
          fi
          # exécuter migrations si activé
          if [ "${{ secrets.RUN_MIGRATIONS }}" = "true" ]; then
            php artisan migrate --force || true
          fi
          EOF
