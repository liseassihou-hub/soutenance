<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Suivi - PEBCO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px;
            font-family: 'Poppins', sans-serif;
        }
        .test-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .animated-bg::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
            z-index: -1;
        }
        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="test-container">
        <div class="text-center mb-4">
            <div class="avatar-circle bg-primary text-white d-flex align-items-center justify-content-center rounded-circle pulse mx-auto mb-3" style="width: 80px; height: 80px; font-size: 32px;">
                <i class="fas fa-search"></i>
            </div>
            <h2 class="fw-bold mb-2">
                Suivre ma Demande
            </h2>
            <p class="text-muted">
                Consultez l'état de votre demande de crédit en temps réel
            </p>
        </div>
        
        <form method="POST" action="http://127.0.0.1:8000/suivi-rechercher" onsubmit="return validateForm(event)">
            <div class="mb-3">
                <label for="code_dossier" class="form-label fw-bold">
                    <i class="fas fa-hashtag me-2"></i>Code Dossier
                </label>
                <input type="text" 
                       class="form-control form-control-lg" 
                       id="code_dossier" 
                       name="code_dossier" 
                       placeholder="Ex: DM202633B472"
                       required>
            </div>

            <div class="d-grid">
                <button type="submit" 
                        class="btn btn-primary btn-lg"
                        style="width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: bold; padding: 15px; border-radius: 8px;">
                    <i class="fas fa-search me-2"></i>
                    Rechercher ma demande
                </button>
            </div>
        </form>
        
        <div id="result" class="mt-3 p-3 rounded" style="display: none;"></div>
        
        <div class="text-center mt-4">
            <a href="http://127.0.0.1:8000/" class="text-white text-decoration-none">
                <i class="fas fa-arrow-left me-2"></i>
                Retour à l'accueil
            </a>
        </div>
    </div>

    <script>
        function validateForm(event) {
            event.preventDefault();
            console.log('🔘 FORMULAIRE SOUMIS !');
            
            const code = document.getElementById('code_dossier').value.trim();
            const resultDiv = document.getElementById('result');
            
            console.log('📋 Code saisi:', code);
            
            if (!code) {
                resultDiv.className = 'mt-3 p-3 rounded bg-danger text-white';
                resultDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Veuillez entrer un code dossier';
                resultDiv.style.display = 'block';
                return false;
            }
            
            // Simulation de la recherche
            resultDiv.className = 'mt-3 p-3 rounded bg-info text-white';
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Recherche en cours...';
            resultDiv.style.display = 'block';
            
            setTimeout(() => {
                // Simulation de résultats
                const codes = {
                    'DM202633B472': { statut: 'acceptée', nom: 'AMOUSSOUGA Carmen' },
                    'DM202693080A': { statut: 'en cours', nom: 'AMAVI Florentin' },
                    'PEBCO-TF2KJO': { statut: 'en attente', nom: 'BOSSOU Basam' }
                };
                
                if (codes[code]) {
                    resultDiv.className = 'mt-3 p-3 rounded bg-success text-white';
                    resultDiv.innerHTML = `
                        <h5><i class="fas fa-check-circle me-2"></i>Demande Trouvée !</h5>
                        <p><strong>Code:</strong> ${code}</p>
                        <p><strong>Nom:</strong> ${codes[code].nom}</p>
                        <p><strong>Statut:</strong> ${codes[code].statut}</p>
                    `;
                } else {
                    resultDiv.className = 'mt-3 p-3 rounded bg-danger text-white';
                    resultDiv.innerHTML = '<i class="fas fa-times-circle me-2"></i>Aucune demande trouvée avec ce code';
                }
            }, 1500);
            
            return false;
        }
        
        // Auto-focus
        document.getElementById('code_dossier').focus();
    </script>
</body>
</html>
