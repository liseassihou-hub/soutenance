<!DOCTYPE html>
<html>
<head>
    <title>Test Formulaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px;
        }
        .test-form {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="test-form">
        <h2 class="text-center mb-4">
            <i class="fas fa-search me-2"></i>
            Test Formulaire de Suivi
        </h2>
        
        <form method="POST" action="http://127.0.0.1:8000/suivi-rechercher">
            <input type="hidden" name="_token" value="test">
            
            <div class="mb-3">
                <label for="code_dossier" class="form-label fw-bold">
                    <i class="fas fa-hashtag me-2"></i>Code Dossier
                </label>
                <input type="text" 
                       class="form-control form-control-lg" 
                       id="code_dossier" 
                       name="code_dossier" 
                       placeholder="Ex: DM202633B472"
                       required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <i class="fas fa-search me-2"></i>
                    Rechercher ma demande
                </button>
            </div>
        </form>
        
        <div class="mt-4 p-3 bg-light rounded">
            <h6>Codes de test:</h6>
            <small>DM202633B472 - Acceptée</small><br>
            <small>DM202693080A - En cours</small><br>
            <small>PEBCO-TF2KJO - En attente</small>
        </div>
    </div>
</body>
</html>
